<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>九九ナンプレ</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>九九ナンプレ</h1>
  <p>九九パズルであそぼう！</p>

<h2>だん をえらぼう</h2>

<div id="dan-buttons">
  <button class="dan-btn" onclick="selectDan(1)">1のだん🔒</button>
  <button class="dan-btn" onclick="selectDan(2)">2のだん</button>
  <button class="dan-btn" onclick="selectDan(3)">3のだん🔒</button>
  <button class="dan-btn" onclick="selectDan(4)">4のだん🔒</button>
  <button class="dan-btn" onclick="selectDan(5)">5のだん🔒</button>
  <button class="dan-btn" onclick="selectDan(6)">6のだん🔒</button>
  <button class="dan-btn" onclick="selectDan(7)">7のだん🔒</button>
  <button class="dan-btn" onclick="selectDan(8)">8のだん🔒</button>
  <button class="dan-btn" onclick="selectDan(9)">9のだん🔒</button>
</div>

<h2>レベル をえらぼう</h2>

<div id="level-buttons">
  <button class="level-btn" onclick="selectLevel(1)">レベル1</button>
  <button class="level-btn" onclick="selectLevel(2)">レベル2</button>
  <button class="level-btn" onclick="selectLevel(3)">レベル3</button>
</div>

 <div id="main-buttons">
  <button onclick="startGame()">🎮あそぶ</button>
  <button>🖨️いんさつ</button>
 </div>
 <button id="howto-btn">📖あそびかた</button>
</div>

<div id="game" style="display:none;">
  <h2>九九ナンプレ</h2>
  <div id="board-frame">
   <div id="board"></div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
