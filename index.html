<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>九九ナンプレ</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>九九ナンプレ</h1>
  <p>九九パズルであそぼう！</p>

<h2>だん をえらぼう</h2>

<div id="dan-buttons">
  <button class="dan-btn" onclick="selectDan(1)">1のだん🔒</button>
  <button class="dan-btn" onclick="selectDan(2)">2のだん</button>
  <button class="dan-btn" onclick="selectDan(3)">3のだん🔒</button>
  <button class="dan-btn" onclick="selectDan(4)">4のだん🔒</button>
  <button class="dan-btn" onclick="selectDan(5)">5のだん🔒</button>
  <button class="dan-btn" onclick="selectDan(6)">6のだん🔒</button>
  <button class="dan-btn" onclick="selectDan(7)">7のだん🔒</button>
  <button class="dan-btn" onclick="selectDan(8)">8のだん🔒</button>
  <button class="dan-btn" onclick="selectDan(9)">9のだん🔒</button>
</div>

<h2>レベル をえらぼう</h2>

<div id="level-buttons">
  <button class="level-btn" onclick="selectLevel(1)">レベル1</button>
  <button class="level-btn" onclick="selectLevel(2)">レベル2</button>
  <button class="level-btn" onclick="selectLevel(3)">レベル3</button>
</div>

 <div id="main-buttons">
  <button class="menu-btn" onclick="startGame()">🎮 あそぶ</button>
  <button class="menu-btn" onclick="printGame()">🖨️ いんさつ</button>
</div>

<button class="menu-btn" id="howto-btn" onclick="showHowTo()">📖 あそびかた</button>
</div>


<div id="game" style="display:none;">

  <div id="game-header">

    <button class="back-btn" onclick="goHome()">← もどる</button>

    <h2>九九ナンプレ</h2>
    <div id="game-info"></div>
  </div>

  <div id="board-frame">
  <div id="board"></div>
</div>

<!-- 回答ボタン -->
<div class="answer-buttons">
  <button class="answer-btn" data-num="1"></button>
  <button class="answer-btn" data-num="2"></button>
  <button class="answer-btn" data-num="3"></button>
  <button class="answer-btn" data-num="4"></button>
  <button class="answer-btn" data-num="5"></button>

  <button class="answer-btn" data-num="6"></button>
  <button class="answer-btn" data-num="7"></button>
  <button class="answer-btn" data-num="8"></button>
  <button class="answer-btn" data-num="9"></button>
  <button class="erase-btn">けす</button>
</div>

<!-- ヒント・チェック -->
<div class="control-row">
  <button class="hint-btn">ヒント</button>
  <button class="check-btn">チェック</button>

  <div class="miss-count">
    ミス：<span id="miss-count">0</span>こ
  </div>
</div>

<!-- 下のボタン -->
<div class="bottom-buttons">
  <button class="restart-btn">さいしょから</button>
  <button class="next-btn">つぎのもんだい</button>
</div>

</div>
<script src="script.js"></script>

</body>
</html>
